# about
about:
  enable: true
  title: "Over mij"
  content: '<p class="lead">
    Ik ben Mees, 26 jaar oud en help al jaren velen uit de regio Amersfoort met hun computer problemen. Ik heb een passie voor ondernemen en ben daarom voor mezelf begonnen.
    </p>
    <p class="lead">
    Hiervoor heb ik 3 jaar ervaring opgedaan bij Uw Computerstudent. Mijn expertise ligt in het helpen van particulieren en kleine bedrijven met al hun IT-gerelateerde vragen en problemen. Of het nu gaat om Windows, Mac, Android of Apple - ik ben altijd bereid om te helpen.
    </p>'
  button:
    icon: "icon-phone-fill"
    btnText: "Bel of Message via WhatsApp"
    URL: "https://wa.me/31623903323"
  image:
    x: "img/who-am-i/user-picture.png"
    _2x: "img/who-am-i/user-picture@2x.png"

